<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MP4 to MP3 Converter</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:500px;
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    margin:15px 0;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

#status{
    margin-top:20px;
    text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h1>🎵 Video ke MP3</h1>

<p>Masukkan link:</p>

<input id="url" placeholder="https://youtube.com/...">

<button onclick="convert()">Convert</button>

<div id="status"></div>

</div>

<script>

function convert(){

let url=document.getElementById("url").value.trim();

if(url==""){
    alert("Masukkan link terlebih dahulu");
    return;
}

document.getElementById("status").innerHTML="⏳ Mengirim ke server...";

// Ganti URL di bawah dengan API milik Anda
fetch("https://example.com/api/convert",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
url:url
})

})

.then(r=>r.json())

.then(data=>{

if(data.download){

document.getElementById("status").innerHTML=
`<a href="${data.download}" target="_blank" style="color:#22c55e;">⬇ Download MP3</a>`;

}else{

document.getElementById("status").innerHTML="Gagal mengubah video.";

}

})

.catch(err=>{

document.getElementById("status").innerHTML=
"API belum tersedia. Ganti URL API pada kode.";

});

}

</script>

</body>
</html>
