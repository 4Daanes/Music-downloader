<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel &mdash; Konversi Video ke MP3</title>
<style>
  :root{
    --bg: #16140f;
    --panel: #1f1c15;
    --tape: #d9a441;
    --tape-dim: #8a6a2c;
    --cream: #ece3d1;
    --dim: #8a8372;
    --red: #b8452f;
    --green: #6f8c4c;
    --radius: 3px;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; min-height:100vh;
    background:
      radial-gradient(ellipse at top, #221f17 0%, var(--bg) 60%);
    color: var(--cream);
    font-family: 'Courier New', ui-monospace, monospace;
  }
  .wrap{
    max-width: 640px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
  header{
    text-align:center;
    margin-bottom: 36px;
  }
  .reel-icon{
    width: 56px; height: 56px;
    margin: 0 auto 14px;
    display:block;
  }
  h1{
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 700;
    font-size: 2.4rem;
    letter-spacing: 0.02em;
    margin: 0 0 6px;
    color: var(--cream);
  }
  h1 span{ color: var(--tape); font-style: italic; }
  .sub{
    color: var(--dim);
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .panel{
    background: var(--panel);
    border: 1px solid #35301f;
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 12px 30px rgba(0,0,0,0.35);
  }
  .drop{
    border: 1.5px dashed var(--tape-dim);
    border-radius: var(--radius);
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .drop.dragover{
    border-color: var(--tape);
    background: rgba(217,164,65,0.06);
  }
  .drop p{
    margin: 6px 0 0;
    color: var(--dim);
    font-size: 0.85rem;
  }
  .drop strong{
    color: var(--cream);
    font-size: 1rem;
    display:block;
    font-family: Georgia, serif;
  }
  input[type=file]{ display:none; }

  .file-line{
    display:flex; align-items:center; justify-content:space-between;
    margin-top: 20px; padding: 10px 14px;
    background: #26221a;
    border-radius: var(--radius);
    font-size: 0.82rem;
    display:none;
  }
  .file-line.show{ display:flex; }
  .file-line .name{ color: var(--cream); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width: 70%; }
  .file-line .size{ color: var(--dim); }

  button#convertBtn{
    width:100%;
    margin-top: 20px;
    padding: 14px;
    background: var(--tape);
    color: #1a1710;
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-size: 0.85rem;
    cursor: pointer;
    transition: filter .15s, transform .05s;
  }
  button#convertBtn:hover{ filter: brightness(1.08); }
  button#convertBtn:active{ transform: translateY(1px); }
  button#convertBtn:disabled{
    background: #4a4635; color: var(--dim); cursor: not-allowed;
  }

  .status{
    margin-top: 18px;
    font-size: 0.78rem;
    color: var(--dim);
    min-height: 18px;
    letter-spacing: 0.02em;
  }
  .status.err{ color: var(--red); }
  .status.ok{ color: var(--green); }

  .meter{
    margin-top: 10px;
    height: 6px;
    background: #2c2819;
    border-radius: 3px;
    overflow: hidden;
    display:none;
  }
  .meter.show{ display:block; }
  .meter-fill{
    height: 100%;
    width: 0%;
    background: repeating-linear-gradient(45deg, var(--tape), var(--tape) 8px, var(--tape-dim) 8px, var(--tape-dim) 16px);
    transition: width .25s ease;
  }

  .result{
    margin-top: 20px;
    display:none;
    text-align:center;
  }
  .result.show{ display:block; }
  .result a{
    display:inline-block;
    padding: 12px 26px;
    border: 1px solid var(--tape);
    color: var(--tape);
    text-decoration:none;
